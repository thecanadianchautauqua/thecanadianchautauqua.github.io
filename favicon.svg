<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="The Canadian Chautauqua">
  <rect width="64" height="64" rx="14" fill="#0c252b"/>
  <g transform="translate(32 32)" stroke="#efe6d1" stroke-linecap="butt">
    <!-- thick rim (Circle Street) -->
    <circle r="23" fill="none" stroke-width="5"/>
    <!-- six bold spokes (three diameters) -->
    <g stroke-width="4.6">
      <line x1="0" y1="-22" x2="0" y2="22"/>
      <line x1="0" y1="-22" x2="0" y2="22" transform="rotate(60)"/>
      <line x1="0" y1="-22" x2="0" y2="22" transform="rotate(120)"/>
    </g>
  </g>
  <!-- hub (the amphitheatre) covers the spoke crossing -->
  <circle cx="32" cy="32" r="12.5" fill="#c2883a" stroke="#0c252b" stroke-width="2"/>
</svg>
